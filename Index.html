<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>نسخه‌نویس داکتر | تجویز هوشمند</title>
  <!-- TailwindCSS (lightweight utility) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Vazirmatn font (ایرانی و زیبا) -->
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- html2canvas + jspdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      font-family: 'Vazirmatn', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #eef2ff 0%, #e0e7f0 100%);
      min-height: 100vh;
      padding: 1rem;
    }
    /* اسکرول‌بار زیبا */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #2c7a6e;
      border-radius: 10px;
    }
    /* افکت‌های سفارشی */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
    }
    .prescription-card {
      transition: all 0.2s ease;
    }
    .modern-input {
      transition: all 0.2s;
      background: #fff;
      border: 1.5px solid #e2e8f0;
    }
    .modern-input:focus {
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2);
      outline: none;
    }
    .btn-gradient {
      background: linear-gradient(105deg, #0f766e, #0d9488);
      transition: all 0.25s;
      box-shadow: 0 6px 14px rgba(13, 148, 136, 0.25);
    }
    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -10px rgba(13, 148, 136, 0.4);
    }
    .btn-secondary {
      background: #f1f5f9;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: #e2e8f0;
      transform: translateY(-1px);
    }
    .tab-active {
      background: #0f766e;
      color: white;
      box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.15);
    }
    .tab-inactive {
      background: transparent;
      color: #334155;
      backdrop-filter: blur(4px);
    }
    .med-item {
      transition: all 0.2s;
    }
    .med-item:hover {
      background: #fef9e3;
      border-color: #facc15;
    }
    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .fade-in {
      animation: fadeSlide 0.25s ease-out forwards;
    }
    /* حالت پرینت A5 */
    @media print {
      body * {
        visibility: hidden;
      }
      #print-area, #print-area * {
        visibility: visible;
      }
      #print-area {
        position: fixed;
        top: 0;
        right: 0;
        width: 148mm;
        height: 210mm;
        margin: 0;
        padding: 0;
        box-shadow: none;
        background: white;
      }
      @page {
        size: A5 portrait;
        margin: 0;
      }
    }
    /* انیمیشن مدال */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body class="antialiased">

  <div id="app" class="max-w-4xl mx-auto relative">
    <!-- هدر اصلی با طراحی مدرن -->
    <div class="glass-card rounded-3xl p-5 mb-5 shadow-xl border border-white/60">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-emerald-700 to-teal-500 rounded-2xl flex items-center justify-center shadow-lg">
            <i data-lucide="prescription" class="w-7 h-7 text-white"></i>
          </div>
          <div>
            <h1 class="text-2xl font-black bg-gradient-to-r from-emerald-800 to-teal-600 bg-clip-text text-transparent">نسخه‌نویس</h1>
            <p id="doctorNameHeader" class="text-sm text-gray-600 font-medium">دکتر احمد احمدی</p>
          </div>
        </div>
        <div class="flex gap-2 bg-white/40 p-1 rounded-2xl backdrop-blur-sm">
          <button id="tabWriteBtn" class="tab-active px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-sm"><i data-lucide="file-pen" class="w-4 h-4"></i> نسخه جدید</button>
          <button id="tabHistoryBtn" class="tab-inactive px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2"><i data-lucide="clock-arrow-up" class="w-4 h-4"></i> سوابق</button>
        </div>
      </div>
    </div>

    <!-- کارت اطلاعات داکتر (قابل ویرایش) -->
    <div onclick="openDoctorSettings()" class="bg-white/80 backdrop-blur-md rounded-2xl p-4 mb-6 border border-teal-100 shadow-md hover:shadow-lg transition-all cursor-pointer group">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="bg-teal-100 p-2 rounded-xl group-hover:bg-teal-200 transition"><i data-lucide="stethoscope" class="w-5 h-5 text-teal-700"></i></div>
          <span class="font-bold text-gray-700">اطلاعات مطب و پزشک</span>
        </div>
        <i data-lucide="settings-2" class="w-4 h-4 text-gray-400 group-hover:text-teal-600"></i>
      </div>
      <div class="grid grid-cols-2 gap-x-4 gap-y-1 mt-3 text-sm text-gray-700 pr-7">
        <span id="settingsDoctorName" class="font-semibold text-teal-800">دکتر احمد احمدی</span>
        <span id="settingsSpecialty">متخصص داخله</span>
        <span id="settingsAddress" class="col-span-2 text-xs text-gray-500">📍 آدرس: کابل، سرک اصلی، شفاخانه جمهوریت</span>
        <span id="settingsPhone" class="text-xs">📞 ۰۷۰۰۰۰۰۰۰۰</span>
        <span id="settingsPhone2" class="text-xs">📞 ۰۷۰۰۰۰۰۰۰۱</span>
      </div>
    </div>

    <!-- بخش نوشتن نسخه -->
    <div id="writeSection" class="space-y-5 fade-in">
      <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-5 border border-white/50 shadow-lg">
        <h2 class="text-lg font-bold text-teal-800 flex items-center gap-2 mb-4"><i data-lucide="user-circle" class="w-5 h-5"></i> اطلاعات بیمار</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">نام کامل بیمار</label>
            <input type="text" id="patientName" class="modern-input w-full rounded-xl px-4 py-2.5 text-sm focus:ring-0" placeholder="مثال: علی رضایی">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">سن</label>
            <input type="text" id="patientAge" class="modern-input w-full rounded-xl px-4 py-2.5 text-sm" placeholder="۳۲ سال">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">تاریخ مراجعه</label>
            <input type="text" id="visitDate" class="modern-input w-full rounded-xl px-4 py-2.5 text-sm" placeholder="۱۴۰۳/۱۱/۲۵">
          </div>
        </div>
      </div>

      <!-- بخش داروها -->
      <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-5 border border-white/50 shadow-lg">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-lg font-bold text-teal-800 flex items-center gap-2"><i data-lucide="pill" class="w-5 h-5"></i> داروهای تجویزی</h2>
          <button onclick="addMedication()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-xl flex items-center gap-1 transition shadow"><i data-lucide="plus-circle" class="w-4 h-4"></i> افزودن دارو</button>
        </div>
        <div id="medicationsList" class="space-y-3 mt-2"></div>
      </div>

      <!-- دکمه‌های عملیاتی -->
      <div class="flex flex-wrap gap-3 justify-center md:justify-start">
        <button onclick="previewPrescription()" class="btn-gradient text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-md"><i data-lucide="eye" class="w-5 h-5"></i> پیش‌نمایش نسخه</button>
        <button onclick="savePrescription()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-md transition"><i data-lucide="save" class="w-5 h-5"></i> ذخیره نسخه</button>
        <button onclick="clearForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-xl font-semibold flex items-center gap-2 transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i> پاک کردن فرم</button>
      </div>
    </div>

    <!-- بخش تاریخچه نسخه‌ها (مخفی ابتدا) -->
    <div id="historySection" class="hidden space-y-4">
      <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-5 shadow-lg">
        <h2 class="text-xl font-bold text-teal-800 flex items-center gap-2 mb-3"><i data-lucide="archive" class="w-5 h-5"></i> نسخه‌های ذخیره شده</h2>
        <div id="historyList" class="space-y-3 max-h-[500px] overflow-y-auto pl-1"></div>
        <p id="emptyHistoryMsg" class="text-center text-gray-400 py-8 text-sm">📭 هنوز نسخه‌ای ذخیره نشده است</p>
      </div>
    </div>
  </div>

  <!-- مودال پیش‌نمایش نسخه A5 -->
  <div id="previewModal" class="fixed inset-0 z-50 hidden items-center justify-center p-3 modal-backdrop" onclick="closePreview()">
    <div class="relative bg-white rounded-3xl p-3 max-w-full shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex flex-wrap gap-2 justify-center mb-4 bg-gray-50 p-2 rounded-2xl">
        <button onclick="exportAsPDF()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 transition"><i data-lucide="file-pdf" class="w-4 h-4"></i> PDF</button>
        <button onclick="exportAsJPG()" class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 transition"><i data-lucide="image" class="w-4 h-4"></i> JPG</button>
        <button onclick="printPresc()" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 transition"><i data-lucide="printer" class="w-4 h-4"></i> پرینت</button>
        <button onclick="closePreview()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 transition"><i data-lucide="x" class="w-4 h-4"></i> بستن</button>
      </div>
      <div id="print-area" class="rx-card" style="width:148mm; height:210mm; background:white; overflow-y:auto; border-radius: 12px; box-shadow:0 20px 35px -10px rgba(0,0,0,0.3);"></div>
    </div>
  </div>

  <!-- مودال تنظیمات داکتر -->
  <div id="doctorModal" class="fixed inset-0 z-50 hidden items-center justify-center p-3 modal-backdrop" onclick="closeDoctorModal()">
    <div class="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl border border-gray-100" onclick="event.stopPropagation()">
      <h2 class="text-2xl font-bold text-teal-800 mb-5 flex items-center gap-2"><i data-lucide="user-cog" class="w-6 h-6"></i> ویرایش اطلاعات پزشک</h2>
      <div class="space-y-4">
        <input type="text" id="docName" placeholder="نام و نام خانوادگی پزشک" class="modern-input w-full rounded-xl px-4 py-3 text-sm">
        <input type="text" id="docSpecialty" placeholder="تخصص" class="modern-input w-full rounded-xl px-4 py-3 text-sm">
        <input type="text" id="docAddress" placeholder="آدرس کامل مطب" class="modern-input w-full rounded-xl px-4 py-3 text-sm">
        <input type="text" id="docPhone1" placeholder="شماره تماس اصلی" class="modern-input w-full rounded-xl px-4 py-3 text-sm">
        <input type="text" id="docPhone2" placeholder="شماره تماس دوم (اختیاری)" class="modern-input w-full rounded-xl px-4 py-3 text-sm">
        <textarea id="docBio" rows="3" placeholder="درباره پزشک (بیوگرافی کوتاه)" class="modern-input w-full rounded-xl px-4 py-3 text-sm resize-none"></textarea>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="saveDoctorSettings()" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-3 rounded-xl font-bold flex-1 transition">ذخیره تغییرات</button>
        <button onclick="closeDoctorModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-3 rounded-xl font-bold flex-1 transition">انصراف</button>
      </div>
    </div>
  </div>

  <!-- مودال حذف -->
  <div id="deleteConfirmModal" class="fixed inset-0 z-50 hidden items-center justify-center p-3 modal-backdrop">
    <div class="bg-white rounded-2xl p-6 max-w-xs w-full text-center shadow-xl">
      <i data-lucide="alert-triangle" class="w-12 h-12 text-amber-500 mx-auto mb-3"></i>
      <p class="font-bold text-gray-800 mb-2">حذف نسخه</p>
      <p class="text-sm text-gray-500 mb-5">آیا از حذف این نسخه اطمینان دارید؟</p>
      <div class="flex gap-3">
        <button onclick="confirmDelete()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl flex-1 font-bold">بله، حذف شود</button>
        <button onclick="cancelDelete()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-xl flex-1 font-bold">انصراف</button>
      </div>
    </div>
  </div>

  <script>
    // ======================== داده‌های اولیه ========================
    let doctorInfo = {
      name: 'دکتر احمد احمدی',
      specialty: 'متخصص داخله',
      address: 'کابل، سرک اصلی، مقابل شفاخانه جمهوریت',
      phone1: '۰۷۰۰۰۰۰۰۰۰',
      phone2: '۰۷۰۰۰۰۰۰۰۱',
      bio: 'فارغ‌التحصیل از دانشگاه علوم پزشکی کابل، بورد تخصصی بیماری‌های داخلی، عضو انجمن پزشکان افغانستان.'
    };
    let prescriptions = [];    // ذخیره نسخه‌ها
    let deleteId = null;
    let medCounter = 0;

    // Load / Save storage
    function loadFromStorage() {
      const savedDoctor = localStorage.getItem('doctorInfo');
      if (savedDoctor) try { doctorInfo = JSON.parse(savedDoctor); } catch(e) {}
      const savedPres = localStorage.getItem('prescriptions');
      if (savedPres) try { prescriptions = JSON.parse(savedPres); } catch(e) {}
      updateDoctorUI();
      renderHistory();
    }
    function saveToStorage() {
      localStorage.setItem('doctorInfo', JSON.stringify(doctorInfo));
      localStorage.setItem('prescriptions', JSON.stringify(prescriptions));
    }

    function updateDoctorUI() {
      document.getElementById('doctorNameHeader').innerText = doctorInfo.name;
      document.getElementById('settingsDoctorName').innerText = doctorInfo.name;
      document.getElementById('settingsSpecialty').innerText = doctorInfo.specialty;
      document.getElementById('settingsAddress').innerHTML = '📍 ' + doctorInfo.address;
      document.getElementById('settingsPhone').innerHTML = '📞 ' + doctorInfo.phone1;
      document.getElementById('settingsPhone2').innerHTML = doctorInfo.phone2 ? '📞 ' + doctorInfo.phone2 : '';
    }

    // ======================== مدیریت داروها ========================
    function addMedication(name = '', mg = '', usage = '') {
      medCounter++;
      const container = document.getElementById('medicationsList');
      const rowId = `med-${medCounter}`;
      const row = document.createElement('div');
      row.id = rowId;
      row.className = 'med-item flex items-start gap-2 p-3 bg-white rounded-xl border border-gray-200 shadow-sm fade-in';
      row.innerHTML = `
        <div class="bg-teal-600 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold shrink-0 mt-1 shadow">${container.children.length + 1}</div>
        <div class="flex-1 grid grid-cols-1 sm:grid-cols-3 gap-2">
          <input type="text" placeholder="نام دارو (مثال: آموکسی‌سیلین)" class="med-name modern-input w-full rounded-lg px-3 py-2 text-sm" value="${escapeHtml(name)}">
          <input type="text" placeholder="دوز و مقدار (mg/ml)" class="med-mg modern-input w-full rounded-lg px-3 py-2 text-sm" value="${escapeHtml(mg)}">
          <input type="text" placeholder="طریقه مصرف (مثال: هر ۸ ساعت)" class="med-usage modern-input w-full rounded-lg px-3 py-2 text-sm" value="${escapeHtml(usage)}">
        </div>
        <button onclick="removeMed('${rowId}')" class="text-rose-400 hover:text-rose-700 p-1.5 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
      `;
      container.appendChild(row);
      lucide.createIcons();
    }
    window.removeMed = function(id) {
      const el = document.getElementById(id);
      if(el) { el.remove(); renumberMeds(); }
    };
    function renumberMeds() {
      const rows = document.getElementById('medicationsList').children;
      for(let i=0; i<rows.length; i++) {
        const badge = rows[i].querySelector('div:first-child');
        if(badge) badge.innerText = i+1;
      }
    }
    function getAllMeds() {
      const rows = document.getElementById('medicationsList').children;
      const meds = [];
      for(let row of rows) {
        const name = row.querySelector('.med-name')?.value.trim();
        const mg = row.querySelector('.med-mg')?.value.trim();
        const usage = row.querySelector('.med-usage')?.value.trim();
        if(name) meds.push({ name, mg, usage });
      }
      return meds;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ======================== ساخت HTML نسخه (طراحی حرفه‌ای) ========================
    function buildPrescriptionHTML(patientName, patientAge, visitDate, meds) {
      const d = doctorInfo;
      let medRows = '';
      if(meds.length === 0) medRows = '<div class="text-center text-gray-400 py-4">⚕️ دارویی ثبت نشده است</div>';
      else {
        meds.forEach((m, idx) => {
          medRows += `
            <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; border-bottom:1px dashed #cbd5e1; padding-bottom:8px;">
              <div style="background:#0f766e; width:26px; height:26px; border-radius:30px; display:flex; align-items:center; justify-content:center; color:white; font-size:12px; font-weight:bold;">${idx+1}</div>
              <div style="flex:1;">
                <span style="font-weight:800; font-size:14px; color:#1e293b;">${escapeHtml(m.name)}</span>
                ${m.mg ? `<span style="font-size:11px; color:#475569; margin-right:8px;">(${escapeHtml(m.mg)})</span>` : ''}
                ${m.usage ? `<div style="font-size:11px; color:#5b6e8c; margin-top:4px;">روش مصرف: ${escapeHtml(m.usage)}</div>` : ''}
              </div>
            </div>
          `;
        });
      }
      return `
        <div style="width:148mm; height:210mm; background:white; font-family:'Vazirmatn',sans-serif; direction:rtl; display:flex; flex-direction:column; box-sizing:border-box;">
          <div style="background:linear-gradient(120deg, #115e59, #0f766e); color:white; text-align:center; padding:18px 12px 12px;">
            <div style="font-size:22px; font-weight:900; letter-spacing:1px;">🕌 هو الشافی</div>
            <div style="font-size:18px; font-weight:800; margin-top:6px;">${escapeHtml(d.name)}</div>
            <div style="font-size:12px; opacity:0.9;">${escapeHtml(d.specialty)}</div>
            <div style="font-size:10px; margin-top:8px; line-height:1.4;">${escapeHtml(d.address)}<br>📞 ${escapeHtml(d.phone1)} ${d.phone2 ? ' | '+escapeHtml(d.phone2) : ''}</div>
          </div>
          <div style="background:#f0fdf4; padding:10px 16px; display:flex; flex-wrap:wrap; gap:12px; border-bottom:2px solid #0f766e; font-size:13px;">
            <span><span style="font-weight:800; color:#0f766e;">بیمار:</span> ${escapeHtml(patientName) || '_________'}</span>
            <span><span style="font-weight:800; color:#0f766e;">سن:</span> ${escapeHtml(patientAge) || '—'}</span>
            <span><span style="font-weight:800; color:#0f766e;">تاریخ:</span> ${escapeHtml(visitDate) || '—'}</span>
          </div>
          <div style="flex:1; padding:16px 20px 50px; overflow-y:auto;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
              <span style="font-size:34px; font-weight:900; color:#0f766e;">℞</span>
              <div style="height:2px; background:linear-gradient(90deg, #0f766e, #cbd5e1); flex:1;"></div>
              <span style="font-size:12px; color:#5b6e8c;">نسخه پزشک</span>
            </div>
            ${medRows}
          </div>
          <div style="border-top:2px dotted #cbd5e1; padding:12px 18px 14px; display:flex; justify-content:space-between; background:white;">
            <div style="max-width:60%; font-size:9px; color:#334155; line-height:1.5;">
              <span style="font-weight:800; color:#0f766e;">📌 درباره پزشک</span><br>${escapeHtml(d.bio)}
            </div>
            <div style="text-align:center;">
              <div style="font-weight:800; font-size:13px; color:#0f766e;">${escapeHtml(d.name)}</div>
              <div style="border-top:2px solid #0f766e; width:70px; margin:6px auto 3px;"></div>
              <div style="font-size:9px; color:#5b6e8c;">امضا و مهر مطب</div>
            </div>
          </div>
        </div>
      `;
    }

    // ======================== پیش‌نمایش ========================
    function previewPrescription() {
      const name = document.getElementById('patientName').value;
      const age = document.getElementById('patientAge').value;
      const date = document.getElementById('visitDate').value;
      const meds = getAllMeds();
      const html = buildPrescriptionHTML(name, age, date, meds);
      document.getElementById('print-area').innerHTML = html;
      document.getElementById('previewModal').style.display = 'flex';
      lucide.createIcons();
    }
    window.closePreview = () => document.getElementById('previewModal').style.display = 'none';

    // ========== خروجی PDF / JPG / پرینت ==========
    async function exportAsPDF() {
      const el = document.getElementById('print-area');
      try {
        const canvas = await html2canvas(el, { scale: 2.5, backgroundColor: '#ffffff', logging: false });
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
        const imgData = canvas.toDataURL('image/jpeg', 0.98);
        pdf.addImage(imgData, 'JPEG', 0, 0, 148, 210);
        pdf.save('نسخه_پزشکی.pdf');
      } catch(e) { alert('خطا در تولید PDF'); }
    }
    async function exportAsJPG() {
      const el = document.getElementById('print-area');
      try {
        const canvas = await html2canvas(el, { scale: 2.5, backgroundColor: '#ffffff' });
        const link = document.createElement('a');
        link.download = 'نسخه_درمان.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
      } catch(e) { alert('خطا در ساخت تصویر'); }
    }
    function printPresc() { window.print(); }

    // ======================== ذخیره نسخه ========================
    function savePrescription() {
      const name = document.getElementById('patientName').value.trim();
      if(!name) { alert('لطفاً نام بیمار را وارد کنید'); return; }
      const meds = getAllMeds();
      if(meds.length === 0) { alert('حداقل یک دارو به نسخه اضافه کنید'); return; }
      const newPres = {
        id: Date.now().toString(),
        patient_name: name,
        patient_age: document.getElementById('patientAge').value.trim(),
        visit_date: document.getElementById('visitDate').value.trim(),
        medications: meds,
        created_at: new Date().toISOString()
      };
      prescriptions.unshift(newPres);
      saveToStorage();
      renderHistory();
      clearForm();
      alert('✅ نسخه با موفقیت ذخیره شد');
    }
    function clearForm() {
      document.getElementById('patientName').value = '';
      document.getElementById('patientAge').value = '';
      document.getElementById('visitDate').value = '';
      document.getElementById('medicationsList').innerHTML = '';
      medCounter = 0;
      addMedication();
    }

    // ======================== تاریخچه ========================
    function renderHistory() {
      const container = document.getElementById('historyList');
      const emptyMsg = document.getElementById('emptyHistoryMsg');
      container.innerHTML = '';
      if(prescriptions.length === 0) { emptyMsg.classList.remove('hidden'); return; }
      emptyMsg.classList.add('hidden');
      prescriptions.forEach(p => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl p-4 shadow-sm border-r-4 border-teal-400 flex justify-between items-center hover:shadow-md transition';
        card.innerHTML = `
          <div>
            <div class="font-bold text-gray-800 text-base">${escapeHtml(p.patient_name)}</div>
            <div class="text-xs text-gray-500 flex gap-3 mt-1">
              <span><i data-lucide="calendar" class="w-3 h-3 inline"></i> ${p.visit_date || 'نامشخص'}</span>
              <span><i data-lucide="pill" class="w-3 h-3 inline"></i> ${p.medications.length} دارو</span>
            </div>
          </div>
          <div class="flex gap-1">
            <button onclick="viewPrescription('${p.id}')" class="p-2 rounded-xl hover:bg-teal-50 text-teal-600 transition" title="مشاهده"><i data-lucide="eye" class="w-5 h-5"></i></button>
            <button onclick="editPrescription('${p.id}')" class="p-2 rounded-xl hover:bg-indigo-50 text-indigo-600 transition" title="ویرایش"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
            <button onclick="requestDelete('${p.id}')" class="p-2 rounded-xl hover:bg-rose-50 text-rose-500 transition" title="حذف"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
          </div>
        `;
        container.appendChild(card);
      });
      lucide.createIcons();
    }
    window.viewPrescription = function(id) {
      const p = prescriptions.find(x => x.id === id);
      if(p) {
        const html = buildPrescriptionHTML(p.patient_name, p.patient_age, p.visit_date, p.medications);
        document.getElementById('print-area').innerHTML = html;
        document.getElementById('previewModal').style.display = 'flex';
        lucide.createIcons();
      }
    };
    window.editPrescription = function(id) {
      const p = prescriptions.find(x => x.id === id);
      if(p) {
        document.getElementById('patientName').value = p.patient_name;
        document.getElementById('patientAge').value = p.patient_age;
        document.getElementById('visitDate').value = p.visit_date;
        document.getElementById('medicationsList').innerHTML = '';
        medCounter = 0;
        if(p.medications.length === 0) addMedication();
        else p.medications.forEach(m => addMedication(m.name, m.mg, m.usage));
        document.getElementById('tabWriteBtn').click();
      }
    };
    window.requestDelete = (id) => { deleteId = id; document.getElementById('deleteConfirmModal').style.display = 'flex'; };
    window.cancelDelete = () => { deleteId = null; document.getElementById('deleteConfirmModal').style.display = 'none'; };
    window.confirmDelete = () => {
      if(deleteId) { prescriptions = prescriptions.filter(p => p.id !== deleteId); saveToStorage(); renderHistory(); }
      cancelDelete();
    };

    // ======================== تنظیمات داکتر ========================
    window.openDoctorSettings = () => {
      document.getElementById('docName').value = doctorInfo.name;
      document.getElementById('docSpecialty').value = doctorInfo.specialty;
      document.getElementById('docAddress').value = doctorInfo.address;
      document.getElementById('docPhone1').value = doctorInfo.phone1;
      document.getElementById('docPhone2').value = doctorInfo.phone2 || '';
      document.getElementById('docBio').value = doctorInfo.bio;
      document.getElementById('doctorModal').style.display = 'flex';
    };
    window.closeDoctorModal = () => document.getElementById('doctorModal').style.display = 'none';
    window.saveDoctorSettings = () => {
      doctorInfo = {
        name: document.getElementById('docName').value.trim() || doctorInfo.name,
        specialty: document.getElementById('docSpecialty').value.trim() || doctorInfo.specialty,
        address: document.getElementById('docAddress').value.trim() || doctorInfo.address,
        phone1: document.getElementById('docPhone1').value.trim() || doctorInfo.phone1,
        phone2: document.getElementById('docPhone2').value.trim(),
        bio: document.getElementById('docBio').value.trim() || doctorInfo.bio
      };
      updateDoctorUI();
      saveToStorage();
      closeDoctorModal();
    };
    // ======================== راه‌اندازی ========================
    window.addEventListener('load', () => {
      loadFromStorage();
      addMedication();
      lucide.createIcons();
      // تب‌ها
      document.getElementById('tabWriteBtn').addEventListener('click', function() {
        document.getElementById('writeSection').classList.remove('hidden');
        document.getElementById('historySection').classList.add('hidden');
        this.classList.add('tab-active'); this.classList.remove('tab-inactive');
        document.getElementById('tabHistoryBtn').classList.add('tab-inactive'); document.getElementById('tabHistoryBtn').classList.remove('tab-active');
      });
      document.getElementById('tabHistoryBtn').addEventListener('click', function() {
        document.getElementById('writeSection').classList.add('hidden');
        document.getElementById('historySection').classList.remove('hidden');
        this.classList.add('tab-active'); this.classList.remove('tab-inactive');
        document.getElementById('tabWriteBtn').classList.add('tab-inactive'); document.getElementById('tabWriteBtn').classList.remove('tab-active');
        renderHistory();
      });
    });
  </script>
</body>
</html>
